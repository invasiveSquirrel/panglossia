<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <circle cx="256" cy="256" r="240" fill="#ffffff" stroke="#000000" stroke-width="4" />
  
  <g transform="translate(256, 256) scale(1.1)">
    <!-- LaTeX style Aleph (\aleph) construction -->
    <!-- Main diagonal -->
    <path d="M 80 -120 L -80 120" fill="none" stroke="#000000" stroke-width="35" stroke-linecap="round" />
    
    <!-- Top-left hook -->
    <path d="M -90 -120 C -40 -120 0 -60 0 0" fill="none" stroke="#000000" stroke-width="30" stroke-linecap="round" />
    
    <!-- Bottom-right hook -->
    <path d="M 90 120 C 40 120 0 60 0 0" fill="none" stroke="#000000" stroke-width="30" stroke-linecap="round" />
  </g>
</svg>
